name: Save score history

on:
  schedule:
    # 平日 18:30 JST = 09:30 UTC
    - cron: "30 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  save-score-history:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance ta

      - name: Save score history
        run: |
          python score_history.py --watchlist watchlist.csv --history score_history.csv

      - name: Commit score history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add score_history.csv
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Update score history"
          git push
